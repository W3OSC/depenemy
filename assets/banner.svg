<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320">
  <defs>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#484f58"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f85149"/>
    </marker>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f85149" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f85149" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="scanbeam" cx="0%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="320" fill="#0d1117" rx="14"/>

  <!-- Scanner beam triangle -->
  <polygon points="38,295 540,110 540,190" fill="url(#scanbeam)"/>

  <!-- ── YOUR PROJECT ── -->
  <rect x="268" y="128" width="144" height="54" rx="10" fill="#1f6feb" stroke="#58a6ff" stroke-width="2"/>
  <text x="340" y="152" text-anchor="middle" fill="white" font-family="monospace" font-size="13" font-weight="bold">your-project</text>
  <text x="340" y="170" text-anchor="middle" fill="#a5d3ff" font-family="monospace" font-size="10">v1.0.0</text>

  <!-- Lines to normal deps -->
  <line x1="290" y1="128" x2="175" y2="75"  stroke="#484f58" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="340" y1="128" x2="340" y2="75"  stroke="#484f58" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="290" y1="182" x2="175" y2="235" stroke="#484f58" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="340" y1="182" x2="340" y2="235" stroke="#484f58" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Red dashed line to villain -->
  <line x1="412" y1="155" x2="498" y2="155" stroke="#f85149" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ar)"/>

  <!-- Normal dep boxes -->
  <rect x="95"  y="44"  width="130" height="46" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="160" y="63"  text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="11" font-weight="bold">react</text>
  <text x="160" y="79"  text-anchor="middle" fill="#484f58" font-family="monospace" font-size="10">18.2.0  safe</text>

  <rect x="262" y="44"  width="155" height="46" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="340" y="63"  text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="11" font-weight="bold">lodash</text>
  <text x="340" y="79"  text-anchor="middle" fill="#484f58" font-family="monospace" font-size="10">4.17.21  safe</text>

  <rect x="95"  y="218" width="130" height="46" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="160" y="237" text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="11" font-weight="bold">axios</text>
  <text x="160" y="253" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="10">1.6.0  safe</text>

  <rect x="262" y="218" width="155" height="46" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="340" y="237" text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="11" font-weight="bold">express</text>
  <text x="340" y="253" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="10">4.18.2  safe</text>

  <!-- ── VILLAIN PACKAGE ── -->
  <!-- Glow halo -->
  <ellipse cx="572" cy="155" rx="90" ry="65" fill="url(#glow)"/>

  <!-- Box -->
  <rect x="498" y="112" width="168" height="88" rx="12" fill="#1a0808" stroke="#f85149" stroke-width="2.5"/>

  <!-- Villain face -->
  <!-- Devil horns -->
  <polygon points="524,124 518,108 530,122" fill="#c0392b"/>
  <polygon points="542,122 538,108 550,124" fill="#c0392b"/>

  <!-- Face -->
  <circle cx="536" cy="145" r="20" fill="#e8452c"/>

  <!-- Eyes - angry slanted -->
  <ellipse cx="529" cy="140" rx="3.5" ry="4" fill="#1a0808"/>
  <ellipse cx="543" cy="140" rx="3.5" ry="4" fill="#1a0808"/>
  <!-- Angry eyebrow lines -->
  <line x1="525" y1="135" x2="533" y2="138" stroke="#1a0808" stroke-width="2" stroke-linecap="round"/>
  <line x1="547" y1="135" x2="539" y2="138" stroke="#1a0808" stroke-width="2" stroke-linecap="round"/>

  <!-- Evil grin -->
  <path d="M525 153 Q536 163 547 153" stroke="#1a0808" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Fangs -->
  <polygon points="531,155 529,161 533,155" fill="white"/>
  <polygon points="541,155 539,161 543,155" fill="white"/>

  <!-- Package name -->
  <text x="620" y="140" text-anchor="middle" fill="#f85149" font-family="monospace" font-size="12" font-weight="bold">evil-logger</text>
  <text x="620" y="158" text-anchor="middle" fill="#ffa657" font-family="monospace" font-size="10">backdoor inside</text>
  <text x="620" y="174" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="9">v0.0.9</text>

  <!-- CAUGHT badge -->
  <rect x="516" y="82" width="72" height="22" rx="5" fill="#f85149"/>
  <text x="552" y="97" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">CAUGHT!</text>

  <!-- ── DEPENEMY SCANNER (magnifying glass) ── -->
  <circle cx="32" cy="282" r="18" fill="none" stroke="#ffd700" stroke-width="3"/>
  <circle cx="32" cy="282" r="10" fill="#0d1117"/>
  <!-- Lens shine -->
  <path d="M25 274 Q29 271 33 274" stroke="white" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <!-- Handle -->
  <line x1="45" y1="295" x2="58" y2="308" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>

  <!-- depenemy label on scanner -->
  <text x="32" y="314" text-anchor="middle" fill="#ffd700" font-family="monospace" font-size="9" font-weight="bold">depenemy</text>

  <!-- Bottom tagline -->
  <text x="360" y="308" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="10">one of your dependencies might be your enemy.</text>
</svg>
